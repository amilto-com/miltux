      MILTUX_PORT: "7070"
      MILTUX_PEERS: "oracle:7070,sentinel:7070,arbiter:7070,nexus:7070,apex:7070,zenith:7070"

  nexus:
    <<: *node-defaults
    container_name: nexus
    hostname: nexus
    environment:
